<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account</title>
  <link rel="stylesheet" href="merged.css">
</head>
<body>

<!-- HEADER -->
<header class="navbar">
  <div class="nav-container">

    <div class="logo-group">
      <img src="https://figma-alpha-api.s3.us-west-2.amazonaws.com/images/dea94ad9-a592-45c7-bb10-e9df3fabdd2a" class="nav-logo">
      <span class="logo-text">DONATE IT</span>
    </div>

    <nav class="nav-links">
      <a href="HomePages.html">Home</a>
      <a href="Request.html">Request Clothes</a>
      <a href="Donate.html">Donate</a>
      <a href="Contact.html">Contact</a>
    </nav>

    <div class="profile-wrapper">
      <div class="profile-icon" onclick="toggleProfileMenu()">
        <svg viewBox="0 0 24 24" fill="none" stroke="#0D0B0B" stroke-width="2">
          <circle cx="12" cy="8" r="4"></circle>
          <path d="M4 20c0-4 4-6 8-6s8 2 8 6"></path>
        </svg>
      </div>

      <div id="profileMenu" class="profile-menu">
        <a href="login.html">Login</a>
        <a href="settings.html">Settings</a>
      </div>
    </div>

  </div>
</header>

<!-- REGISTER FORM -->
<section class="register-wrapper">
  <div class="register-container">

    <form class="register-box" onsubmit="registerAccount(event)">
      <h2 class="register-title">Create Account</h2>

      <label class="form-label">Name</label>
      <input type="text" id="name" class="form-input" placeholder="Enter your name">

      <label class="form-label">Email</label>
      <input type="email" id="email" class="form-input" placeholder="Enter your email">

      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-input" placeholder="Enter your password">

      <p id="errorMessage" class="error-message"></p>

      <button class="full-btn">Register</button>

      <p class="signin-with">Or sign in with</p>

      <div class="google-btn">
        <img class="google-icon" src="https://figma-alpha-api.s3.us-west-2.amazonaws.com/images/671fa5f4-c15f-42f8-88d6-131c2a7404de">
        <span class="google-text">Continue with Google</span>
      </div>

    </form>

    <img class="register-side-image" src="https://figma-alpha-api.s3.us-west-2.amazonaws.com/images/688f48eb-9dcd-4cb6-9cb3-6c6ee39dba53">

  </div>
</section>

<!-- FOOTER -->
<footer class="site-footer">
  <p>© 2025 Donate It — All Rights Reserved</p>
</footer>

<!-- JS -->
<script>
function registerAccount(event) {
  event.preventDefault();

  const name = document.getElementById("name").value.trim();
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const errorMessage = document.getElementById("errorMessage");

  if (name === "" || email === "" || password === "") {
    errorMessage.textContent = "All fields are required.";
    return;
  }

  if (!email.includes("@") || !email.includes(".")) {
    errorMessage.textContent = "Invalid email address.";
    return;
  }

  if (password.length < 6) {
    errorMessage.textContent = "Password must be at least 6 characters.";
    return;
  }

  errorMessage.textContent = "";
  alert("Registered successfully!");
}

function toggleProfileMenu() {
  const menu = document.getElementById("profileMenu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}

document.addEventListener("click", function(e) {
  const menu = document.getElementById("profileMenu");
  const icon = document.querySelector(".profile-icon");

  if (!icon.contains(e.target) && !menu.contains(e.target)) {
    menu.style.display = "none";
  }
});
</script>

</body>
</html>
